<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>勇者联盟：白眼小人的地下城</title>
    <style>
        /* 冒险岛休闲 RPG 风格 CSS */
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Microsoft YaHei', 'Comic Sans MS', sans-serif;
            user-select: none;
        }
        #game-container {
            width: 800px;
            height: 600px;
            position: relative;
            background: linear-gradient(to bottom, #87CEEB 0%, #bdf3ff 60%, #a8e67a 60%, #5cba3a 100%);
            border: 6px solid #f39c12;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        /* 装饰性白云 */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
        }
        .c1 { width: 120px; height: 40px; top: 50px; left: 100px; }
        .c1::before { content:''; position:absolute; width:60px; height:60px; background:white; border-radius:50%; top:-30px; left:20px; }
        .c2 { width: 100px; height: 35px; top: 80px; right: 150px; transform: scale(0.8); }
        .c2::before { content:''; position:absolute; width:50px; height:50px; background:white; border-radius:50%; top:-25px; left:20px; }
        
        /* 角色图片 - 🌟彻底解决遮挡问题 */
        #hero-img {
            position: absolute;
            bottom: 300px; /* 大幅抬高 */
            left: 50%;     /* 水平居中 */
            transform: translateX(-50%); /* 配合水平居中 */
            width: 180px;  /* 调整尺寸适配上半屏 */
            animation: breathe 2s infinite ease-in-out;
            filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.3));
            z-index: 3;    /* ⭐ 图层最高，绝对不会被对话框遮挡 */
        }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -10px); }
        }

        /* 顶部状态栏 */
        #status-bar {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #f1c40f;
            border-radius: 10px;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 4; /* 状态栏保持最最上面 */
        }
        .stat span { color: #f1c40f; }

        /* 对话框面板 */
        #dialog-box {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            background: rgba(20, 30, 50, 0.85);
            border: 4px solid #bdc3c7;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 2; /* 对话框在角色下面 */
        }
        #scene-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 80px;
        }

        /* 选项按钮 */
        #options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background: linear-gradient(to bottom, #3498db, #2980b9);
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 10px 15px;
            color: white;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .option-btn:hover {
            background: linear-gradient(to bottom, #f39c12, #d35400);
            transform: translateX(10px);
        }
        .option-btn:active { transform: scale(0.98); }

        /* 浮动提示文本 */
        .float-text {
            position: absolute;
            color: #ff4757;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 2px 2px 0 #000;
            animation: floatUp 1.5s forwards;
            pointer-events: none;
            z-index: 10;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>

    <div id="status-bar">
        <div class="stat">❤️ 血量: <span id="ui-hp">100</span></div>
        <div class="stat">🗡️ 攻击: <span id="ui-atk">10</span></div>
        <div class="stat">🙄 白眼值: <span id="ui-eye">0</span>/100</div>
        <div class="stat">🪙 金币: <span id="ui-gold">0</span></div>
        <div class="stat">⏳ 进度: <span id="ui-prog">1</span>/5</div>
    </div>

    <!-- 角色图层提至 z-index: 3 -->
    <img id="hero-img" src="hero.png" alt="白眼勇者" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'200\' height=\'200\'><rect width=\'200\' height=\'200\' fill=\'#ccc\'/><text x=\'50\' y=\'100\' fill=\'black\'>未找到hero.png</text></svg>'">

    <div id="dialog-box">
        <div id="scene-text">载入中...</div>
        <div id="options-container">
            <!-- 按钮由 JS 动态生成 -->
        </div>
    </div>
</div>

<script>
    let hp = 100, eye = 0, gold = 0, progress = 1, isGameOver = false;

    const storyData = [
        {
            scene: "【第 1 幕】伴随着一阵刺眼的白光，你降生在“咕咕镇”广场。村长死死抓住你的肩膀：“天命的勇者啊！请拯救世界！”他硬塞给你一把沾着黏液的破铁剑。",
            options: [
                { text: "[常规] 大喊一声“为了联盟！”，热血冲向地下城。", effect: { hp: 0, eye: 0, gold: 0 }, msg: "" },
                { text: "[贪婪] 趁村长闭眼祈祷，偷偷摸走他的金币袋。", effect: { hp: 0, eye: 0, gold: 50 }, msg: "+50 金币" },
                { text: "[专属] 嫌弃地用两根手指捏住破剑，附赠村长一个托马斯回旋白眼。", effect: { hp: 0, eye: 35, gold: 0 }, msg: "+35 白眼值" }
            ]
        },
        {
            scene: "【第 2 幕】你来到了微风森林，一只 Q 弹的绿色史莱姆挡住了去路。它向你吐了一个口水泡泡，似乎在挑衅。",
            options: [
                { text: "[常规] 拔出破剑，一顿乱砍！", effect: { hp: -10, eye: 0, gold: 10 }, msg: "-10 血量, +10 金币" },
                { text: "[贪婪] 徒手把它抓起来，卖给路过的神秘商人。", effect: { hp: -20, eye: 0, gold: 100 }, msg: "-20 血量, +100 金币" },
                { text: "[专属] 站在原地，和史莱姆进行长达三分钟的互瞪翻白眼比赛。", effect: { hp: 0, eye: 35, gold: 0 }, msg: "+35 白眼值" }
            ]
        },
        {
            scene: "【第 3 幕】在地下城入口，你发现了一个闪闪发光的宝箱，但旁边有一排可疑的地刺陷阱。",
            options: [
                { text: "[常规] 小心翼翼地避开陷阱打开宝箱。", effect: { hp: 0, eye: 0, gold: 50 }, msg: "+50 金币" },
                { text: "[贪婪] 闭着眼睛直接冲过去强行砸开！", effect: { hp: -30, eye: 0, gold: 200 }, msg: "-30 血量, +200 金币" },
                { text: "[专属] 鄙视宝箱太俗气，对着它翻个白眼直接路过。", effect: { hp: 0, eye: 35, gold: 0 }, msg: "+35 白眼值" }
            ]
        },
        {
            scene: "【第 4 幕】轰隆隆！一只两米高的狂暴牛头人破墙而出！它挥舞着巨大的斧头向你冲来！",
            options: [
                { text: "[常规] 勇敢地迎战，哪怕受重伤也要保卫和平！", effect: { hp: -50, eye: 0, gold: 100 }, msg: "-50 血量, +100 金币" },
                { text: "[贪婪] 撒出一把金币吸引它的注意力，然后趁机逃跑。", effect: { hp: 0, eye: 0, gold: -50 }, msg: "-50 金币" },
                { text: "[专属] 嘲笑牛头人的中分发型，并翻了一个极度轻蔑的白眼。", effect: { hp: 0, eye: 35, gold: 0 }, msg: "+35 白眼值" }
            ]
        },
        {
            scene: "【第 5 幕】你终于来到了最深处。关底 Boss“黄金史莱姆王”居高临下地看着你，最终的决战开始了！",
            options: [
                { text: "[常规] 拼尽全力释放出全部力量，最后一击！", effect: { hp: -30, eye: 0, gold: 500 }, msg: "-30 血量，通关！" },
                { text: "[专属] “下班时间到了”，你敷衍地挥了一剑。", effect: { hp: 0, eye: 35, gold: 0 }, msg: "+35 白眼值" }
            ]
        }
    ];

    function updateUI() {
        document.getElementById('ui-hp').innerText = Math.max(0, hp);
        document.getElementById('ui-eye').innerText = Math.min(100, eye);
        document.getElementById('ui-gold').innerText = gold;
        document.getElementById('ui-prog').innerText = Math.min(5, progress);
    }

    function showFloatingText(text) {
        if (!text) return;
        const ft = document.createElement('div');
        ft.className = 'float-text';
        ft.innerText = text;
        ft.style.left = '350px';
        ft.style.top = '250px'; /* 提示文字也抬高一点 */
        document.getElementById('game-container').appendChild(ft);
        setTimeout(() => ft.remove(), 1500);
    }

    function renderScene() {
        updateUI();
        if (isGameOver) return;

        const sceneEl = document.getElementById('scene-text');
        const optsEl = document.getElementById('options-container');
        optsEl.innerHTML = ''; 

        if (hp <= 0) { triggerEnding('bad'); return; }
        if (eye >= 100) { triggerEnding('true'); return; }
        if (progress > 5) { triggerEnding('normal'); return; }

        const currentData = storyData[progress - 1];
        sceneEl.innerText = currentData.scene;

        currentData.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => handleChoice(opt.effect, opt.msg);
            optsEl.appendChild(btn);
        });
    }

    function handleChoice(effect, msg) {
        hp += effect.hp;
        eye += effect.eye;
        gold += effect.gold;
        progress++;
        showFloatingText(msg);
        renderScene();
    }

    function triggerEnding(type) {
        isGameOver = true;
        const sceneEl = document.getElementById('scene-text');
        const optsEl = document.getElementById('options-container');
        optsEl.innerHTML = '<button class="option-btn" onclick="location.reload()" style="text-align:center;">🔄 重新开始游戏</button>';

        if (type === 'bad') {
            document.getElementById('hero-img').style.transform = 'translate(-50%, 0) rotate(90deg) translateY(50px)';
            sceneEl.innerHTML = `<span style="color:#ff4757; font-size:22px;">【扑街结局：累觉不爱】</span><br>你被怪物揍扁了。你翻着白眼倒在了地下城冰冷的地板上，内心毫无波澜，甚至懒得留下一句遗言。`;
        } 
        else if (type === 'true') {
            document.getElementById('hero-img').style.filter = 'drop-shadow(0 0 20px #f1c40f) brightness(1.2) scale(1.1)';
            sceneEl.innerHTML = `<span style="color:#f1c40f; font-size:22px;">【真结局：王之蔑视】</span><br>你的白眼值达到 100！你翻了一个突破天际的白眼！强烈的吐槽能量化作实质的冲击波，周围的怪物羞愧到当场退群，魔王连夜买站票逃走。你兵不血刃拯救了世界！`;
        } 
        else if (type === 'normal') {
            sceneEl.innerHTML = `<span style="color:#2ecc71; font-size:22px;">【普通结局：打工人永不为奴】</span><br>你成功击败了 Boss！带着满身疲惫和 ${gold} 金币回到了新手村。村长激动地要给你立雕像，被你无情拒绝并要求折现。你只想下班睡觉。`;
        }
    }

    renderScene();
</script>
</body>
</html>
